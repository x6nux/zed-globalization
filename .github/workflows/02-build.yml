          MONITOR_PID=$!

          set +e
          python3 "$GITHUB_WORKSPACE/script/ci-build.py" --source-dir "$GITHUB_WORKSPACE/zed" --target x86_64-apple-darwin --jobs 4
          BUILD_EXIT=$?
          set -e

          kill $MONITOR_PID 2>/dev/null || true
          PEAK_MEM=$(tail -n +2 "$MEM_LOG" | cut -d, -f2 | sort -n | tail -1)
          PEAK_SWAP=$(tail -n +2 "$MEM_LOG" | cut -d, -f4 | sort -n | tail -1)
          TOTAL_MEM=$(tail -n +2 "$MEM_LOG" | head -1 | cut -d, -f3)
          SAMPLES=$(tail -n +2 "$MEM_LOG" | wc -l)
          echo "===== 内存监控摘要 ====="
          echo "物理内存: 峰值 ${PEAK_MEM}MB / 总计 ${TOTAL_MEM}MB"
          echo "交换内存: 峰值 ${PEAK_SWAP}MB"
          echo "采样记录数: $SAMPLES"
          [ $BUILD_EXIT -ne 0 ] && exit $BUILD_EXIT

          echo "=== 编译 CLI 辅助二进制 ==="
          cargo build --release --package cli --target x86_64-apple-darwin --manifest-path "$GITHUB_WORKSPACE/zed/Cargo.toml"

      - name: 停止 sccache
        if: env.SCCACHE_AVAILABLE == 'true'
        run: |
          echo "========================================="
          echo "         sccache 编译缓存统计 (x86_64)"
          echo "========================================="
          sccache --show-stats
          HITS=$(sccache --show-stats 2>&1 | awk '/^Cache hits /{print $NF}' | head -1)
          MISSES=$(sccache --show-stats 2>&1 | awk '/^Cache misses /{print $NF}' | head -1)
          HITS=${HITS:-0}; MISSES=${MISSES:-0}; TOTAL=$((HITS + MISSES))
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(awk "BEGIN {printf \"%.1f\", $HITS/$TOTAL*100}")
            echo ">>> 缓存命中: $HITS / $TOTAL ($RATE%)"
          fi
          echo "========================================="
          sccache --stop-server || true

      - name: 打包 sccache 缓存
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        run: |
          CACHE_KEY="sccache-macos-x86_64"
          DIRS=()
          [ -d "$HOME/Library/Caches/Mozilla.sccache" ] && DIRS+=("Users/runner/Library/Caches/Mozilla.sccache")
          [ -d "$HOME/.cargo/registry" ] && DIRS+=("Users/runner/.cargo/registry")
          [ -d "$HOME/.cargo/git" ]      && DIRS+=("Users/runner/.cargo/git")
          if [ ${#DIRS[@]} -gt 0 ]; then
            tar -czf "${CACHE_KEY}.tar.gz" -C / "${DIRS[@]}" 2>/dev/null || true
          fi
          echo "缓存归档大小: $(du -sh ${CACHE_KEY}.tar.gz 2>/dev/null | cut -f1 || echo '(未生成)')"

      - name: 上传 sccache 缓存 Artifact
        id: upload_artifact
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sccache-macos-x86_64
          path: sccache-macos-x86_64.tar.gz
          retention-days: 30

      - name: 更新缓存索引
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CACHE_KEY="sccache-macos-x86_64"
          if [ -n "${PREV_ARTIFACT_ID:-}" ]; then
            gh api -X DELETE \
              "/repos/${{ github.repository }}/actions/artifacts/${PREV_ARTIFACT_ID}" \
              && echo "✓ 已删除旧 Artifact" || true
          fi
          FILE_PATH="sccache/${CACHE_KEY}.runid"
          CONTENT_B64=$(python3 -c "import base64; print(base64.b64encode('${{ github.run_id }}'.encode()).decode())")
          FILE_SHA=$(gh api \
            "/repos/${{ github.repository }}/contents/${FILE_PATH}?ref=i18n" \
            --jq '.sha' 2>/dev/null || true)
          if [ -n "$FILE_SHA" ]; then
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f sha="$FILE_SHA" -f branch="i18n"
          else
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f branch="i18n"
          fi
          echo "✓ 缓存索引已更新 (Run ID: ${{ github.run_id }})"

      - name: 保存 sccache 缓存（Artifact 失败时回退）
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome != 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            /Users/runner/Library/Caches/Mozilla.sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: sccache-macos-x86_64

      - name: 上传 x86_64 二进制
        uses: actions/upload-artifact@v4
        with:
          name: zed-macos-x86_64-bin
          path: |
            zed/target/x86_64-apple-darwin/release/zed
            zed/target/x86_64-apple-darwin/release/cli

  # ===========================================================================
  # 5c. macOS 合并打包（Universal Binary + DMG）
  # ===========================================================================
  build-macos-universal:
    needs: [versioning, build-macos-aarch64, build-macos-x86_64]
    if: ${{ needs.versioning.outputs.should_release == 'true' }}
    runs-on: macos-latest
    env:
      BUILD_VERSION: ${{ needs.versioning.outputs.upstream_version }}
      LANG_LOWER: ${{ needs.versioning.outputs.lang_lower }}
    steps:
      - name: 下载 aarch64 二进制
        uses: actions/download-artifact@v4
        with:
          name: zed-macos-aarch64-bin
          path: bins/aarch64

      - name: 下载 x86_64 二进制
        uses: actions/download-artifact@v4
        with:
          name: zed-macos-x86_64-bin
          path: bins/x86_64

      - name: 下载图标资源
        uses: actions/download-artifact@v4
        with:
          name: zed-macos-resources
          path: resources

      - name: 合并 Universal Binary 并打包 DMG（三份）
        run: |
          chmod +x bins/aarch64/zed bins/x86_64/zed
          lipo -create bins/aarch64/zed bins/x86_64/zed -output zed-universal
          echo "Universal binary 架构: $(lipo -archs zed-universal)"
          chmod +x bins/aarch64/cli bins/x86_64/cli
          lipo -create bins/aarch64/cli bins/x86_64/cli -output cli-universal
          echo "CLI universal 架构: $(lipo -archs cli-universal)"
          strip -x bins/aarch64/zed bins/x86_64/zed zed-universal bins/aarch64/cli bins/x86_64/cli cli-universal

          # === 生成应用图标 ICNS（仅一次）===
          ICONSET_DIR="AppIcon.iconset"
          mkdir -p "$ICONSET_DIR"
          ICON_SRC="resources/app-icon@2x.png"
          if [ -f "$ICON_SRC" ]; then
            sips -z 16 16     "$ICON_SRC" --out "$ICONSET_DIR/icon_16x16.png"
            sips -z 32 32     "$ICON_SRC" --out "$ICONSET_DIR/icon_16x16@2x.png"
            sips -z 32 32     "$ICON_SRC" --out "$ICONSET_DIR/icon_32x32.png"
            sips -z 64 64     "$ICON_SRC" --out "$ICONSET_DIR/icon_32x32@2x.png"
            sips -z 128 128   "$ICON_SRC" --out "$ICONSET_DIR/icon_128x128.png"
            sips -z 256 256   "$ICON_SRC" --out "$ICONSET_DIR/icon_128x128@2x.png"
            sips -z 256 256   "$ICON_SRC" --out "$ICONSET_DIR/icon_256x256.png"
            sips -z 512 512   "$ICON_SRC" --out "$ICONSET_DIR/icon_256x256@2x.png"
            sips -z 512 512   "$ICON_SRC" --out "$ICONSET_DIR/icon_512x512.png"
            cp "$ICON_SRC"         "$ICONSET_DIR/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET_DIR" -o AppIcon.icns
            echo "应用图标已生成"
          else
            echo "未找到图标源文件 $ICON_SRC"
          fi

          # === 公共函数：binary -> .app -> DMG ===
          make_dmg() {
            local BINARY="$1"
            local DMG_NAME="$2"
            local CLI_BINARY="$3"
            local APP="ZedG-tmp.app"
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
            cp "$BINARY" "$APP/Contents/MacOS/zed"
            chmod +x "$APP/Contents/MacOS/zed"
            cp "$CLI_BINARY" "$APP/Contents/MacOS/cli"
            chmod +x "$APP/Contents/MacOS/cli"
            [ -f AppIcon.icns ] && cp AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
            [ -f "resources/Document.icns" ] && cp resources/Document.icns "$APP/Contents/Resources/"
            cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>zed</string>
              <key>CFBundleIdentifier</key><string>dev.zed.ZedG</string>
              <key>CFBundleName</key><string>ZedG</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>${{ needs.versioning.outputs.upstream_version }}</string>
          </dict>
          </plist>
          PLIST
            local STAGING="dmg-staging-$$"
            mkdir -p "$STAGING"
            mv "$APP" "$STAGING/ZedG.app"
            ln -s /Applications "$STAGING/Applications"
            sleep 3
            local n=0
            until [ "$n" -ge 10 ]; do
              hdiutil create -volname ZedG -srcfolder "$STAGING" -ov -format UDZO "$DMG_NAME" && break
              n=$((n+1))
              echo "hdiutil 失败, 等待 15 秒后重试 ($n/10)..."
              sleep 15
            done
            rm -rf "$STAGING"
            [ -f "$DMG_NAME" ] || { echo "打包 $DMG_NAME 失败"; exit 1; }
            echo "✓ $DMG_NAME ($(du -sh "$DMG_NAME" | cut -f1))"
          }

          echo "=== 打包 Universal ==="
          make_dmg zed-universal "zedg-${LANG_LOWER}-macos-universal-${BUILD_VERSION}.dmg" cli-universal
          echo "=== 打包 Apple Silicon (aarch64) ==="
          make_dmg bins/aarch64/zed "zedg-${LANG_LOWER}-macos-aarch64-${BUILD_VERSION}.dmg" bins/aarch64/cli
          echo "=== 打包 Intel (x86_64) ==="
          make_dmg bins/x86_64/zed "zedg-${LANG_LOWER}-macos-x86_64-${BUILD_VERSION}.dmg" bins/x86_64/cli

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: zed-macos
          path: |
            zedg-${{ env.LANG_LOWER }}-macos-universal-${{ env.BUILD_VERSION }}.dmg
            zedg-${{ env.LANG_LOWER }}-macos-aarch64-${{ env.BUILD_VERSION }}.dmg
            zedg-${{ env.LANG_LOWER }}-macos-x86_64-${{ env.BUILD_VERSION }}.dmg

  # ===========================================================================
  # 5d. Linux ARM64 构建
  # ===========================================================================
  build-linux-aarch64:
    needs: [versioning, prepare]
    if: ${{ needs.versioning.outputs.should_release == 'true' }}
    runs-on: ubuntu-24.04-arm
    env:
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_IDLE_TIMEOUT: "0"
      BUILD_VERSION: ${{ needs.versioning.outputs.upstream_version }}
      LANG_LOWER: ${{ needs.versioning.outputs.lang_lower }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.3

      - name: 检查 sccache 可用性
        run: |
          if command -v sccache &>/dev/null && sccache --version &>/dev/null; then
            echo "SCCACHE_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "✓ sccache 可用，将启用编译缓存"
          else
            echo "SCCACHE_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "⚠ sccache 不可用，将不使用编译缓存"
          fi

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config python3 libasound2-dev \
            libx11-dev libx11-xcb-dev libxkbfile-dev libgtk-3-dev \
            libxcb-xinput-dev libwayland-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-xinerama0-dev \
            libxcb-randr0-dev libxcb-keysyms1-dev libxcb-util-dev \
            libgl1-mesa-dev libegl1-mesa-dev libfreetype6-dev libfontconfig1-dev \
            libssl-dev libudev-dev libclang-dev clang cmake mold
          echo "RUSTFLAGS=-C linker=clang -C link-arg=-fuse-ld=mold" >> $GITHUB_ENV

      - name: 克隆 Zed 源码并检出 Tag
        run: |
          git clone ${{ env.ZED_REPO }} zed
          cd zed
          git checkout $BUILD_VERSION
          echo "Checked out $BUILD_VERSION"

      - name: 下载本地化补丁
        uses: actions/download-artifact@v4
        with:
          name: l10n-patch

      - name: 应用本地化补丁
        run: |
          cd zed
          git apply ../l10n.patch

      - name: 从 Artifact 恢复 sccache 缓存
        if: env.SCCACHE_AVAILABLE == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CACHE_KEY="sccache-linux-aarch64"
          PREV_RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/contents/sccache/${CACHE_KEY}.runid?ref=i18n" \
            --jq '.content' 2>/dev/null | \
            python3 -c "import base64,sys; print(base64.b64decode(sys.stdin.read()).decode().strip())" \
            2>/dev/null || true)
          [ -z "$PREV_RUN_ID" ] && echo "⚠ 无缓存索引，首次构建" && exit 0
          ARTIFACT_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/runs/${PREV_RUN_ID}/artifacts" \
            --jq ".artifacts[] | select(.name == \"${CACHE_KEY}\") | .id" 2>/dev/null || true)
          [ -z "$ARTIFACT_ID" ] && echo "⚠ Artifact 不存在或已过期" && exit 0
          echo "下载缓存 Artifact (ID: $ARTIFACT_ID)..."
          curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o /tmp/sccache-cache.zip
          unzip -p /tmp/sccache-cache.zip "${CACHE_KEY}.tar.gz" | \
            tar -xzf - -C / 2>/dev/null || true
          rm -f /tmp/sccache-cache.zip
          echo "✓ 缓存已恢复（Artifact）"
          echo "PREV_ARTIFACT_ID=${ARTIFACT_ID}" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_HIT=artifact" >> "$GITHUB_ENV"

      - name: 从 Cache 恢复 sccache 缓存（Artifact 失败时回退）
        if: env.SCCACHE_AVAILABLE == 'true' && env.SCCACHE_CACHE_HIT != 'artifact'
        uses: actions/cache/restore@v4
        with:
          path: |
            /home/runner/.cache/sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: sccache-linux-aarch64
          restore-keys: sccache-linux-arm64

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启动 sccache
        if: env.SCCACHE_AVAILABLE == 'true'
        run: |
          sccache --stop-server || true
          sccache --start-server
          sccache --zero-stats
          sccache -s

      - name: 构建 Release
        env:
          RELEASE_CHANNEL: stable
        run: |
          if [ "$SCCACHE_AVAILABLE" = "true" ]; then
            export RUSTC_WRAPPER=sccache
            echo "已启用 sccache 编译缓存"
          else
            export RUSTC_WRAPPER=""
            echo "⚠ sccache 不可用，直接编译（无缓存加速）"
          fi

          MEM_LOG="/tmp/mem_monitor.csv"
          echo "timestamp,used_mb,total_mb,swap_used_mb,swap_total_mb" > "$MEM_LOG"
          (
            while true; do
              TOTAL_MB=$(($(awk '/^MemTotal:/{print $2}' /proc/meminfo) / 1024))
              AVAIL_MB=$(($(awk '/^MemAvailable:/{print $2}' /proc/meminfo) / 1024))
              USED_MB=$((TOTAL_MB - AVAIL_MB))
              SWAP_TOTAL_MB=$(($(awk '/^SwapTotal:/{print $2}' /proc/meminfo) / 1024))
              SWAP_FREE_MB=$(($(awk '/^SwapFree:/{print $2}' /proc/meminfo) / 1024))
              SWAP_USED_MB=$((SWAP_TOTAL_MB - SWAP_FREE_MB))
              echo "$(date +%H:%M:%S),$USED_MB,$TOTAL_MB,$SWAP_USED_MB,$SWAP_TOTAL_MB" >> "$MEM_LOG"
              sleep 10
            done
          ) &
          MONITOR_PID=$!

          set +e
          python3 "$GITHUB_WORKSPACE/script/ci-build.py" --source-dir "$GITHUB_WORKSPACE/zed" --jobs 4
          BUILD_EXIT=$?
          set -e

          kill $MONITOR_PID 2>/dev/null || true
          echo "===== 内存监控摘要 ====="
          PEAK_MEM=$(tail -n +2 "$MEM_LOG" | cut -d, -f2 | sort -n | tail -1)
          PEAK_SWAP=$(tail -n +2 "$MEM_LOG" | cut -d, -f4 | sort -n | tail -1)
          TOTAL_MEM=$(tail -n +2 "$MEM_LOG" | head -1 | cut -d, -f3)
          TOTAL_SWAP=$(tail -n +2 "$MEM_LOG" | head -1 | cut -d, -f5)
          SAMPLES=$(tail -n +2 "$MEM_LOG" | wc -l)
          echo "物理内存: 峰值 ${PEAK_MEM}MB / 总计 ${TOTAL_MEM}MB"
          echo "交换内存: 峰值 ${PEAK_SWAP}MB / 总计 ${TOTAL_SWAP}MB"
          if [ "$PEAK_SWAP" -gt 0 ] 2>/dev/null; then echo "⚠ 编译期间使用了交换内存!"; fi
          echo "采样记录数: $SAMPLES"

          exit $BUILD_EXIT

      - name: 停止 sccache
        if: env.SCCACHE_AVAILABLE == 'true'
        run: |
          echo ""
          echo "========================================="
          echo "         sccache 编译缓存统计"
          echo "========================================="
          sccache --show-stats
          echo "-----------------------------------------"
          HITS=$(sccache --show-stats 2>&1 | awk '/^Cache hits /{print $NF}' | head -1)
          MISSES=$(sccache --show-stats 2>&1 | awk '/^Cache misses /{print $NF}' | head -1)
          HITS=${HITS:-0}; MISSES=${MISSES:-0}
          TOTAL=$((HITS + MISSES))
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(awk "BEGIN {printf \"%.1f\", $HITS/$TOTAL*100}")
            echo ">>> 缓存命中: $HITS / $TOTAL ($RATE%)"
            if [ "$(echo "$RATE < 30" | bc)" -eq 1 ]; then echo ">>> ⚠ 命中率偏低，首次构建或缓存失效"; fi
          else
            echo ">>> 无编译请求经过 sccache"
          fi
          echo "========================================="
          echo ""
          sccache --stop-server || true

      - name: 打包 sccache 缓存
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        run: |
          CACHE_KEY="sccache-linux-aarch64"
          tar -czf "${CACHE_KEY}.tar.gz" \
            --ignore-failed-read \
            -C / \
            home/runner/.cache/sccache \
            home/runner/.cargo/registry \
            home/runner/.cargo/git 2>/dev/null || true
          echo "缓存归档大小: $(du -sh ${CACHE_KEY}.tar.gz | cut -f1)"

      - name: 上传 sccache 缓存 Artifact
        id: upload_artifact
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sccache-linux-aarch64
          path: sccache-linux-aarch64.tar.gz
          retention-days: 30

      - name: 更新缓存索引
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CACHE_KEY="sccache-linux-aarch64"
          if [ -n "${PREV_ARTIFACT_ID:-}" ]; then
            gh api -X DELETE \
              "/repos/${{ github.repository }}/actions/artifacts/${PREV_ARTIFACT_ID}" \
              && echo "✓ 已删除旧 Artifact" || true
          fi
          FILE_PATH="sccache/${CACHE_KEY}.runid"
          CONTENT_B64=$(python3 -c "import base64; print(base64.b64encode('${{ github.run_id }}'.encode()).decode())")
          FILE_SHA=$(gh api \
            "/repos/${{ github.repository }}/contents/${FILE_PATH}?ref=i18n" \
            --jq '.sha' 2>/dev/null || true)
          if [ -n "$FILE_SHA" ]; then
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f sha="$FILE_SHA" -f branch="i18n"
          else
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f branch="i18n"
          fi
          echo "✓ 缓存索引已更新 (Run ID: ${{ github.run_id }})"

      - name: 保存 sccache 缓存（Artifact 失败时回退）
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome != 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            /home/runner/.cache/sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: sccache-linux-aarch64

      - name: 打包 Linux ARM64
        run: |
          objcopy --strip-debug zed/target/release/zed

          mkdir -p dist/usr/bin
          mkdir -p dist/usr/share/applications
          mkdir -p dist/usr/share/icons/hicolor/512x512/apps
          mkdir -p dist/usr/share/icons/hicolor/1024x1024/apps
          cp "zed/target/release/zed" dist/usr/bin/zedg

          cp zed/crates/zed/resources/app-icon.png \
             dist/usr/share/icons/hicolor/512x512/apps/zedg.png
          cp zed/crates/zed/resources/app-icon@2x.png \
             dist/usr/share/icons/hicolor/1024x1024/apps/zedg.png

          cat > dist/usr/share/applications/zedg.desktop <<DESKTOP
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=ZedG
          GenericName=Text Editor
          Comment=A high-performance, multiplayer code editor with globalization support.
          TryExec=zedg
          StartupNotify=true
          Exec=zedg %F
          Icon=zedg
          Categories=Utility;TextEditor;Development;IDE;
          Keywords=zed;
          MimeType=text/plain;
          DESKTOP

          tar -czvf "zedg-${LANG_LOWER}-linux-aarch64-${BUILD_VERSION}.tar.gz" -C dist .

          mkdir -p deb-pkg/DEBIAN deb-pkg/usr/bin
          mkdir -p deb-pkg/usr/share/applications
          mkdir -p deb-pkg/usr/share/icons/hicolor/512x512/apps
          mkdir -p deb-pkg/usr/share/icons/hicolor/1024x1024/apps
          cp "zed/target/release/zed" deb-pkg/usr/bin/zedg
          cp dist/usr/share/applications/zedg.desktop deb-pkg/usr/share/applications/
          cp dist/usr/share/icons/hicolor/512x512/apps/zedg.png \
             deb-pkg/usr/share/icons/hicolor/512x512/apps/
          cp dist/usr/share/icons/hicolor/1024x1024/apps/zedg.png \
             deb-pkg/usr/share/icons/hicolor/1024x1024/apps/

          RAW_VERSION="${{ needs.versioning.outputs.upstream_version }}"
          CLEAN_VERSION="${RAW_VERSION#v}"
          cat > deb-pkg/DEBIAN/control <<CTRL
          Package: zedg
          Version: $CLEAN_VERSION
          Architecture: arm64
          Maintainer: zed-globalization
          Description: Zed editor with globalization support.
          CTRL
          dpkg-deb --build deb-pkg "zedg-${LANG_LOWER}-linux-aarch64-${BUILD_VERSION}.deb"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux-arm64
          path: |
            zedg-${{ env.LANG_LOWER }}-linux-aarch64-${{ env.BUILD_VERSION }}.tar.gz
            zedg-${{ env.LANG_LOWER }}-linux-aarch64-${{ env.BUILD_VERSION }}.deb

  # ===========================================================================
  # 6. 正式发布
  # ===========================================================================
  release:
    runs-on: ubuntu-latest
    needs: [versioning, build-windows-x86_64, build-windows-aarch64, build-windows-msi, build-linux-x86_64, build-linux-aarch64, build-macos-universal]
    if: >-
      always() &&
      needs.versioning.outputs.should_release == 'true' &&
      needs.versioning.result == 'success' &&
      needs.build-windows-x86_64.result == 'success' &&
      needs.build-windows-aarch64.result == 'success' &&
      needs.build-linux-x86_64.result == 'success' &&
      needs.build-linux-aarch64.result == 'success' &&
      needs.build-macos-universal.result == 'success'
    env:
      LANG_LOWER: ${{ needs.versioning.outputs.lang_lower }}
      TARGET_LANG: ${{ needs.versioning.outputs.lang }}
      BUILD_VERSION: ${{ needs.versioning.outputs.upstream_version }}

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 从 i18n 分支获取翻译文件
        id: release_trans
        run: |
          git fetch origin i18n
          git checkout origin/i18n -- i18n/ 2>/dev/null || mkdir -p i18n

          TRANS=""
          if [ -f "i18n/${BUILD_VERSION}/${TARGET_LANG}.json" ]; then
            TRANS="i18n/${BUILD_VERSION}/${TARGET_LANG}.json"
          elif ls -d i18n/v*/ >/dev/null 2>&1; then
            NEWER=$(ls -d i18n/v*/ | sed 's|i18n/||;s|/||' | sort -V | \
              awk -v cur="$BUILD_VERSION" '$0 > cur { print; exit }')
            OLDER=$(ls -d i18n/v*/ | sed 's|i18n/||;s|/||' | sort -V | \
              awk -v cur="$BUILD_VERSION" '{ if ($0 < cur) prev=$0 } END { if (prev) print prev }')
            if [ -n "$NEWER" ] && [ -f "i18n/${NEWER}/${TARGET_LANG}.json" ]; then
              TRANS="i18n/${NEWER}/${TARGET_LANG}.json"
            elif [ -n "$OLDER" ] && [ -f "i18n/${OLDER}/${TARGET_LANG}.json" ]; then
              TRANS="i18n/${OLDER}/${TARGET_LANG}.json"
            fi
          fi
          [ -z "$TRANS" ] && [ -f "i18n/${TARGET_LANG}.json" ] && TRANS="i18n/${TARGET_LANG}.json"
          [ -z "$TRANS" ] && TRANS="" && echo "无翻译文件可用"

          echo "trans_file=${TRANS}" >> $GITHUB_OUTPUT
          echo "翻译文件: ${TRANS:-无}"

      - name: 获取并翻译 Release Notes
        env:
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          TRANS_FILE: ${{ steps.release_trans.outputs.trans_file }}
        run: |
          pip install ".[ai]" -q
          TRANS_ARG=""
          [ -n "$TRANS_FILE" ] && TRANS_ARG="--translation-file $TRANS_FILE"
          zedl10n release-notes \
            --version "$BUILD_VERSION" \
            --lang "$TARGET_LANG" \
            $TRANS_ARG \
            --output /tmp/release_body.md
          echo "--- Release body preview ---"
          head -30 /tmp/release_body.md

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "{zed-*,l10n-patch}"

      - name: 整理文件与生成 Hash
        run: |
          mkdir release-dist
          mv "artifacts/zed-windows/zedg-${LANG_LOWER}-windows-x86_64-${BUILD_VERSION}.zip" release-dist/ || echo "No Windows x86_64 artifact"
          mv "artifacts/zed-windows-arm64/zedg-${LANG_LOWER}-windows-aarch64-${BUILD_VERSION}.zip" release-dist/ || echo "No Windows ARM64 artifact"
          mv "artifacts/zed-windows-msi/zedg-${LANG_LOWER}-windows-x86_64-${BUILD_VERSION}.msi" release-dist/ || echo "No Windows x86_64 MSI"
          mv "artifacts/zed-windows-msi/zedg-${LANG_LOWER}-windows-aarch64-${BUILD_VERSION}.msi" release-dist/ || echo "No Windows aarch64 MSI"
          mv "artifacts/zed-linux/zedg-${LANG_LOWER}-linux-x86_64-${BUILD_VERSION}.tar.gz" release-dist/ || echo "No Linux x86_64 tar artifact"
          mv "artifacts/zed-linux/zedg-${LANG_LOWER}-linux-x86_64-${BUILD_VERSION}.deb" release-dist/ || echo "No Linux x86_64 deb artifact"
          mv "artifacts/zed-linux-arm64/zedg-${LANG_LOWER}-linux-aarch64-${BUILD_VERSION}.tar.gz" release-dist/ || echo "No Linux ARM64 tar artifact"
          mv "artifacts/zed-linux-arm64/zedg-${LANG_LOWER}-linux-aarch64-${BUILD_VERSION}.deb" release-dist/ || echo "No Linux ARM64 deb artifact"
          mv "artifacts/zed-macos/zedg-${LANG_LOWER}-macos-universal-${BUILD_VERSION}.dmg" release-dist/ || echo "No macOS Universal artifact"
          mv "artifacts/zed-macos/zedg-${LANG_LOWER}-macos-aarch64-${BUILD_VERSION}.dmg" release-dist/ || echo "No macOS aarch64 artifact"
          mv "artifacts/zed-macos/zedg-${LANG_LOWER}-macos-x86_64-${BUILD_VERSION}.dmg" release-dist/ || echo "No macOS x86_64 artifact"
          mv "artifacts/l10n-patch/l10n.patch" "release-dist/zedg-${LANG_LOWER}-l10n-${BUILD_VERSION}.patch" || echo "No l10n patch"
          mv "artifacts/l10n-patch/l10n-source.tar.gz" "release-dist/zedg-${LANG_LOWER}-source-${BUILD_VERSION}.tar.gz" || echo "No l10n source"

          cd release-dist
          sha256sum * > sha256sums.txt

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zed Globalization ${{ needs.versioning.outputs.lang }} ${{ needs.versioning.outputs.version }}
          tag_name: ${{ needs.versioning.outputs.version }}
          body_path: /tmp/release_body.md
          prerelease: ${{ needs.versioning.outputs.is_prerelease == 'true' }}
          files: release-dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 触发 Scoop 和 Homebrew 更新
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.versioning.outputs.version }}"
          IS_PRE="${{ needs.versioning.outputs.is_prerelease }}"
          echo "触发下游更新, 版本: $VERSION, pre-release: $IS_PRE"
          gh workflow run 03-update-scoop.yml -f version_tag="$VERSION" -f is_prerelease="$IS_PRE" || echo "⚠ 触发 Scoop 更新失败"
          gh workflow run 04-update-homebrew.yml -f version_tag="$VERSION" -f is_prerelease="$IS_PRE" || echo "⚠ 触发 Homebrew 更新失败"
