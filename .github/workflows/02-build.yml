name: 02 构建发行

on:
  # 由 translate 链式触发
  repository_dispatch:
    types: [build-ready]

  # 手动触发
  workflow_dispatch:
    inputs:
      release:
        description: "是否正式发布 Release"
        type: boolean
        default: true
      version:
        description: "指定构建版本 (空则自动获取官方最新)"
        type: string
      lang:
        description: "目标语言"
        type: choice
        options:
          - zh-CN
          - zh-TW
          - ja
          - ko
        default: zh-CN
      skip_check:
        description: "跳过编译检查（加速手动触发）"
        type: boolean
        default: false
permissions:
  contents: write
  actions: write

concurrency:
  group: build
  cancel-in-progress: false

env:
  ZED_REPO: https://github.com/zed-industries/zed.git
  # === 加速配置 ===
  RUSTC_WRAPPER: "sccache"
  CARGO_INCREMENTAL: "0"
  SCCACHE_RECACHE_THIRD_PARTY_DEPS: "1"
  SCCACHE_CACHE_SIZE: "10G"
  SCCACHE_IDLE_TIMEOUT: "0"
  # === 网络稳定性 ===
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # ===========================================================================
  # 1. 智能版本判断 + 语言参数
  # ===========================================================================
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_vars.outputs.v }}
      upstream_version: ${{ steps.set_vars.outputs.upstream_v }}
      should_release: ${{ steps.set_vars.outputs.r }}
      is_prerelease: ${{ steps.set_vars.outputs.is_prerelease }}
      lang: ${{ steps.set_vars.outputs.lang }}
      lang_lower: ${{ steps.set_vars.outputs.lang_lower }}
    steps:
      - id: set_vars
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Trigger Event: ${{ github.event_name }}"

          # === 1. 链式触发 (repository_dispatch) ===
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
             BASE_VER="${{ github.event.client_payload.version }}"
             LANG="${{ github.event.client_payload.lang }}"
             LANG="${LANG:-zh-CN}"
             IS_PRERELEASE="${{ github.event.client_payload.is_prerelease }}"
             IS_PRERELEASE="${IS_PRERELEASE:-false}"
             SHOULD_RELEASE="true"

          # === 2. 手动触发 (workflow_dispatch) ===
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
             INPUT_VER="${{ inputs.version }}"
             LANG="${{ inputs.lang }}"
             LANG="${LANG:-zh-CN}"
             if [ -n "$INPUT_VER" ]; then
                BASE_VER="$INPUT_VER"
                echo "手动指定版本: $BASE_VER"
                # 手动指定版本时，查询该版本是否为 pre-release
                IS_PRERELEASE=$(curl -s "https://api.github.com/repos/zed-industries/zed/releases/tags/$INPUT_VER" | jq -r '.prerelease // false')
             else
                LATEST_JSON=$(curl -s "https://api.github.com/repos/zed-industries/zed/releases?per_page=1")
                BASE_VER=$(echo "$LATEST_JSON" | jq -r '.[0].tag_name')
                IS_PRERELEASE=$(echo "$LATEST_JSON" | jq -r '.[0].prerelease')
                echo "手动触发，自动获取最新: $BASE_VER (pre-release: $IS_PRERELEASE)"
             fi
             SHOULD_RELEASE="${{ inputs.release }}"
          fi

          # === Tag 去重：v0.222.4 → v0.222.4.1 → v0.222.4.2 ===
          VER="$BASE_VER"
          if gh release view "$VER" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Tag $VER 已存在，查找下一个可用后缀..."
            SUFFIX=1
            while gh release view "${BASE_VER}.${SUFFIX}" --repo "${{ github.repository }}" >/dev/null 2>&1; do
              SUFFIX=$((SUFFIX + 1))
            done
            VER="${BASE_VER}.${SUFFIX}"
            echo "使用新 Tag: $VER"
          fi

          echo "v=$VER" >> $GITHUB_OUTPUT
          echo "upstream_v=$BASE_VER" >> $GITHUB_OUTPUT
          echo "r=$SHOULD_RELEASE" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE:-false}" >> $GITHUB_OUTPUT
          echo "lang=$LANG" >> $GITHUB_OUTPUT
          # zh-CN → zh-cn, ja → ja
          LANG_LOWER=$(echo "$LANG" | tr '[:upper:]' '[:lower:]')
          echo "lang_lower=$LANG_LOWER" >> $GITHUB_OUTPUT

  # ===========================================================================
  # 2. 在 Linux 上统一执行本地化替换，生成补丁
  # ===========================================================================
  prepare:
    runs-on: ubuntu-latest
    needs: versioning
    if: ${{ needs.versioning.outputs.should_release == 'true' }}
    env:
      BUILD_VERSION: ${{ needs.versioning.outputs.upstream_version }}
      TARGET_LANG: ${{ needs.versioning.outputs.lang }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 克隆 Zed 源码并检出 Tag
        run: |
          git clone --depth 1 --branch $BUILD_VERSION ${{ env.ZED_REPO }} zed

      - name: 安装 Python 与工具
        run: pip install .

      - name: 从 i18n 分支获取翻译文件和禁止翻译列表
        id: get_trans
        run: |
          git fetch origin i18n
          # 获取整个 i18n/ 目录用于版本查找
          git checkout origin/i18n -- i18n/ 2>/dev/null || mkdir -p i18n
          git checkout origin/i18n -- "config/do_not_translate.json"

          # 查找最佳翻译文件：精确版本 → 最近新版 → 最近旧版 → 旧版平铺
          TRANS=""
          if [ -f "i18n/${BUILD_VERSION}/${TARGET_LANG}.json" ]; then
            TRANS="i18n/${BUILD_VERSION}/${TARGET_LANG}.json"
            echo "使用精确版本翻译: $TRANS"
          elif ls -d i18n/v*/ >/dev/null 2>&1; then
            # 先找比当前版本新的最近版本
            NEWER=$(ls -d i18n/v*/ | sed 's|i18n/||;s|/||' | sort -V | \
              awk -v cur="$BUILD_VERSION" '$0 > cur { print; exit }')
            # 再找比当前版本旧的最近版本
            OLDER=$(ls -d i18n/v*/ | sed 's|i18n/||;s|/||' | sort -V | \
              awk -v cur="$BUILD_VERSION" '{ if ($0 < cur) prev=$0 } END { if (prev) print prev }')

            if [ -n "$NEWER" ] && [ -f "i18n/${NEWER}/${TARGET_LANG}.json" ]; then
              TRANS="i18n/${NEWER}/${TARGET_LANG}.json"
              echo "使用最近新版 ${NEWER} 的翻译: $TRANS"
            elif [ -n "$OLDER" ] && [ -f "i18n/${OLDER}/${TARGET_LANG}.json" ]; then
              TRANS="i18n/${OLDER}/${TARGET_LANG}.json"
              echo "使用最近旧版 ${OLDER} 的翻译: $TRANS"
            fi
          fi

          if [ -z "$TRANS" ] && [ -f "i18n/${TARGET_LANG}.json" ]; then
            TRANS="i18n/${TARGET_LANG}.json"
            echo "使用旧版平铺翻译: $TRANS"
          fi

          if [ -z "$TRANS" ]; then
            TRANS="i18n/${BUILD_VERSION}/${TARGET_LANG}.json"
            mkdir -p "i18n/${BUILD_VERSION}"
            echo '{}' > "$TRANS"
            echo "无可用翻译，使用空文件"
          fi

          echo "trans_file=$TRANS" >> $GITHUB_OUTPUT

      - name: 执行本地化替换
        run: zedl10n replace --input "${{ steps.get_trans.outputs.trans_file }}" --source-root zed --do-not-translate config/do_not_translate.json

      - name: 应用 Agent 环境变量补丁
        run: python3 patch_agent_env.py --source-root zed

      - name: 安装编译依赖
        if: ${{ inputs.skip_check != true }}
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libasound2-dev \
            libx11-dev libx11-xcb-dev libxkbfile-dev libgtk-3-dev \
            libxcb-xinput-dev libwayland-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-xinerama0-dev \
            libxcb-randr0-dev libxcb-keysyms1-dev libxcb-util-dev \
            libgl1-mesa-dev libegl1-mesa-dev libfreetype6-dev libfontconfig1-dev \
            libssl-dev libudev-dev libclang-dev clang cmake

      - name: 安装 Rust
        if: ${{ inputs.skip_check != true }}
        uses: dtolnay/rust-toolchain@stable

      - name: 编译检查
        if: ${{ inputs.skip_check != true }}
        env:
          RUSTC_WRAPPER: ""
        run: |
          cd zed
          cargo check 2>&1 | tail -5

      - name: 生成本地化补丁
        run: |
          cd zed
          git add -A
          git diff --cached --binary > ../l10n.patch
          echo "补丁大小: $(du -h ../l10n.patch | cut -f1)"

      - name: 打包翻译后源码
        run: |
          tar -czf "l10n-source.tar.gz" \
            --exclude='.git' \
            --exclude='target' \
            -C zed .
          echo "源码包大小: $(du -h l10n-source.tar.gz | cut -f1)"

      - name: 上传补丁与源码包
        uses: actions/upload-artifact@v4
        with:
          name: l10n-patch
          path: |
            l10n.patch
            l10n-source.tar.gz
          retention-days: 1

  # ===========================================================================
  # 3. Windows 构建
  # ===========================================================================
  build-windows-x86_64:
    needs: [versioning, prepare]
    if: ${{ needs.versioning.outputs.should_release == 'true' }}
    runs-on: windows-latest
    env:
      SCCACHE_DIR: D:\c\sccache
      SCCACHE_IDLE_TIMEOUT: "0"
      BUILD_VERSION: ${{ needs.versioning.outputs.upstream_version }}
      LANG_LOWER: ${{ needs.versioning.outputs.lang_lower }}
    steps:
      - uses: actions/checkout@v4

      - name: 开启 Git Longpaths
        run: git config --system core.longpaths true

      - name: 设置目录环境 (使用 D 盘避免 C 盘空间不足)
        shell: pwsh
        run: |
          Get-PSDrive -PSProvider FileSystem | Select-Object Name, @{N='Free(GB)';E={[math]::Round($_.Free/1GB,1)}}
          New-Item -ItemType Directory -Force -Path D:\c
          New-Item -ItemType Directory -Force -Path D:\c\sccache
          New-Item -ItemType Directory -Force -Path D:\temp
          echo "CARGO_HOME=D:\c" >> $env:GITHUB_ENV
          echo "TEMP=D:\temp" >> $env:GITHUB_ENV
          echo "TMP=D:\temp" >> $env:GITHUB_ENV

      - name: 克隆 Zed 源码并检出 Tag
        shell: pwsh
        run: |
          git -c core.autocrlf=false clone ${{ env.ZED_REPO }} D:\z
          Set-Location D:\z
          git checkout $env:BUILD_VERSION
          Write-Host "已切换到版本: $env:BUILD_VERSION"

      - name: 下载本地化补丁
        uses: actions/download-artifact@v4
        with:
          name: l10n-patch

      - name: 应用本地化补丁
        shell: bash
        run: |
          cd /d/z
          git apply "$GITHUB_WORKSPACE/l10n.patch"

      - name: 准备 Rust 环境
        run: |
          rustup update stable
          rustup default stable

      - name: 安装 sccache
        shell: pwsh
        run: |
          $installed = $false

          # 方案1: choco 安装（最多重试 3 次）
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "Chocolatey 安装 sccache 尝试 $i/3..."
            choco install sccache -y --no-progress 2>&1
            if ($LASTEXITCODE -eq 0 -and (Get-Command sccache -ErrorAction SilentlyContinue)) {
              Write-Host "choco 安装成功"
              $installed = $true
              break
            }
            Write-Host "第 $i 次安装失败 (exit=$LASTEXITCODE)"
            if ($i -lt 3) { Write-Host "等待 30 秒后重试..."; Start-Sleep -Seconds 30 }
          }

          # 方案2: 直接从 GitHub Releases 下载
          if (-not $installed) {
            Write-Host "choco 安装失败，尝试从 GitHub Releases 直接下载..."
            try {
              $release = Invoke-RestMethod "https://api.github.com/repos/mozilla/sccache/releases/latest"
              $asset = $release.assets | Where-Object {
                $_.name -match "x86_64-pc-windows-msvc" -and $_.name -match "\.zip$"
              } | Select-Object -First 1
              if ($asset) {
                Write-Host "下载: $($asset.browser_download_url)"
                $zipPath = "D:\temp\sccache.zip"
                $binDir  = "D:\temp\sccache-bin"
                Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath -UseBasicParsing
                Expand-Archive -Path $zipPath -DestinationPath $binDir -Force
                $sccacheExe = Get-ChildItem -Path $binDir -Filter "sccache.exe" -Recurse | Select-Object -First 1
                if ($sccacheExe) {
                  echo "$($sccacheExe.DirectoryName)" >> $env:GITHUB_PATH
                  & "$($sccacheExe.FullName)" --version
                  if ($LASTEXITCODE -eq 0) {
                    Write-Host "GitHub Releases 安装成功"
                    $installed = $true
                  }
                }
              } else {
                Write-Host "未找到 Windows x86_64 资产"
              }
            } catch {
              Write-Host "GitHub Releases 下载失败: $_"
            }
          }

          if ($installed) {
            echo "SCCACHE_AVAILABLE=true" >> $env:GITHUB_ENV
            Write-Host "✓ sccache 可用，将启用编译缓存"
          } else {
            echo "SCCACHE_AVAILABLE=false" >> $env:GITHUB_ENV
            Write-Host "⚠ sccache 所有安装方式均失败，将不使用编译缓存"
          }

      - name: 从 Artifact 恢复 sccache 缓存
        if: env.SCCACHE_AVAILABLE == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          MSYS_NO_PATHCONV: 1
        shell: bash
        run: |
          CACHE_KEY="sccache-windows-x86_64"
          PREV_RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/contents/sccache/${CACHE_KEY}.runid?ref=i18n" \
            --jq '.content' 2>/dev/null | \
            python3 -c "import base64,sys; print(base64.b64decode(sys.stdin.read()).decode().strip())" \
            2>/dev/null || true)
          [ -z "$PREV_RUN_ID" ] && echo "⚠ 无缓存索引，首次构建" && exit 0
          ARTIFACT_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/runs/${PREV_RUN_ID}/artifacts" \
            --jq ".artifacts[] | select(.name == \"${CACHE_KEY}\") | .id" 2>/dev/null || true)
          [ -z "$ARTIFACT_ID" ] && echo "⚠ Artifact 不存在或已过期" && exit 0
          echo "下载缓存 Artifact (ID: $ARTIFACT_ID)..."
          curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o /tmp/sccache-cache.zip
          unzip -p /tmp/sccache-cache.zip "${CACHE_KEY}.tar.gz" | \
            tar -xzf - -C /d/ 2>/dev/null || true
          rm -f /tmp/sccache-cache.zip
          echo "✓ 缓存已恢复（Artifact）"
          echo "PREV_ARTIFACT_ID=${ARTIFACT_ID}" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_HIT=artifact" >> "$GITHUB_ENV"

      - name: 从 Cache 恢复 sccache 缓存（Artifact 失败时回退）
        if: env.SCCACHE_AVAILABLE == 'true' && env.SCCACHE_CACHE_HIT != 'artifact'
        uses: actions/cache/restore@v4
        with:
          path: |
            D:\c\sccache
            D:\c\registry
            D:\c\git
          key: sccache-windows-x86_64
          restore-keys: sccache-win

      - name: 启动 sccache server
        if: env.SCCACHE_AVAILABLE == 'true'
        run: |
          sccache --start-server
          sccache --zero-stats

      - name: 构建 Release (带重试)
        shell: pwsh
        env:
          RELEASE_CHANNEL: stable
        run: |
          # 根据 sccache 可用性决定是否启用缓存
          if ($env:SCCACHE_AVAILABLE -eq "true") {
            $env:RUSTC_WRAPPER = "sccache"
            Write-Host "已启用 sccache 编译缓存"
          } else {
            $env:RUSTC_WRAPPER = ""
            Write-Host "⚠ sccache 不可用，直接编译（无缓存加速）"
          }

          # 启动内存监控后台任务
          $monitorJob = Start-Job -ScriptBlock {
              $log = "D:\mem_monitor.csv"
              "timestamp,used_mb,total_mb,swap_used_mb,swap_total_mb" | Out-File $log
              while ($true) {
                  $os = Get-CimInstance Win32_OperatingSystem
                  $totalMB = [math]::Round($os.TotalVisibleMemorySize / 1024)
                  $freeMB  = [math]::Round($os.FreePhysicalMemory / 1024)
                  $usedMB  = $totalMB - $freeMB
                  $swapTotalMB = [math]::Round(($os.SizeStoredInPagingFiles) / 1024)
                  $swapFreeMB  = [math]::Round(($os.FreeSpaceInPagingFiles) / 1024)
                  $swapUsedMB  = $swapTotalMB - $swapFreeMB
                  $ts = Get-Date -Format "HH:mm:ss"
                  "$ts,$usedMB,$totalMB,$swapUsedMB,$swapTotalMB" | Out-File $log -Append
                  Start-Sleep -Seconds 10
              }
          }

          python3 "$env:GITHUB_WORKSPACE\script\ci-build.py" --source-dir D:\z --jobs 4 --retries 3
          $buildExit = $LASTEXITCODE

          # 停止监控并输出摘要
          Stop-Job $monitorJob; Remove-Job $monitorJob
          Write-Host "===== 内存监控摘要 ====="
          if (Test-Path "D:\mem_monitor.csv") {
              $csv = Import-Csv "D:\mem_monitor.csv"
              if ($csv.Count -gt 0) {
                  $peakMem  = ($csv | Measure-Object -Property used_mb -Maximum).Maximum
                  $peakSwap = ($csv | Measure-Object -Property swap_used_mb -Maximum).Maximum
                  $totalMem = $csv[0].total_mb
                  Write-Host "物理内存: 峰值 ${peakMem}MB / 总计 ${totalMem}MB"
                  Write-Host "交换内存: 峰值 ${peakSwap}MB"
                  if ([int]$peakSwap -gt 0) { Write-Host "⚠ 编译期间使用了交换内存!" }
                  Write-Host "采样记录数: $($csv.Count)"
              } else {
                  Write-Host "(no samples collected)"
              }
          } else {
              Write-Host "(monitor did not produce data)"
          }

          if ($buildExit -ne 0) { exit $buildExit }

      - name: 停止 sccache
        if: env.SCCACHE_AVAILABLE == 'true'
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "========================================="
          Write-Host "         sccache 编译缓存统计"
          Write-Host "========================================="
          $stats = sccache --show-stats 2>&1
          $stats | Write-Host
          Write-Host "-----------------------------------------"
          $hits   = ($stats | Select-String "Cache hits\s+(\d+)" | ForEach-Object { $_.Matches[0].Groups[1].Value }) -as [int]
          $misses = ($stats | Select-String "Cache misses\s+(\d+)" | ForEach-Object { $_.Matches[0].Groups[1].Value }) -as [int]
          $total  = $hits + $misses
          if ($total -gt 0) {
              $rate = [math]::Round($hits / $total * 100, 1)
              Write-Host ">>> 缓存命中: $hits / $total ($rate%)"
              if ($rate -lt 30) { Write-Host ">>> ⚠ 命中率偏低，首次构建或缓存失效" }
          } else {
              Write-Host ">>> 无编译请求经过 sccache"
          }
          Write-Host "========================================="
          Write-Host ""
          sccache --stop-server || $true

      - name: 打包 sccache 缓存
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        shell: bash
        run: |
          CACHE_KEY="sccache-windows-x86_64"
          tar -czf "${CACHE_KEY}.tar.gz" \
            --ignore-failed-read \
            -C /d \
            c/sccache c/registry c/git 2>/dev/null || true
          echo "缓存归档大小: $(du -sh ${CACHE_KEY}.tar.gz | cut -f1)"

      - name: 上传 sccache 缓存 Artifact
        id: upload_artifact
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sccache-windows-x86_64
          path: sccache-windows-x86_64.tar.gz
          retention-days: 30

      - name: 更新缓存索引
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          MSYS_NO_PATHCONV: 1
        shell: bash
        run: |
          CACHE_KEY="sccache-windows-x86_64"
          if [ -n "${PREV_ARTIFACT_ID:-}" ]; then
            gh api -X DELETE \
              "/repos/${{ github.repository }}/actions/artifacts/${PREV_ARTIFACT_ID}" \
              && echo "✓ 已删除旧 Artifact" || true
          fi
          FILE_PATH="sccache/${CACHE_KEY}.runid"
          CONTENT_B64=$(python3 -c "import base64; print(base64.b64encode('${{ github.run_id }}'.encode()).decode())")
          FILE_SHA=$(gh api \
            "/repos/${{ github.repository }}/contents/${FILE_PATH}?ref=i18n" \
            --jq '.sha' 2>/dev/null || true)
          if [ -n "$FILE_SHA" ]; then
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f sha="$FILE_SHA" -f branch="i18n"
          else
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f branch="i18n"
          fi
          echo "✓ 缓存索引已更新 (Run ID: ${{ github.run_id }})"

      - name: 保存 sccache 缓存（Artifact 失败时回退）
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome != 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            D:\c\sccache
            D:\c\registry
            D:\c\git
          key: sccache-windows-x86_64

      - name: 打包 Windows
        shell: pwsh
        run: |
          mkdir zed-dist
          Copy-Item "D:\z\target\release\zed.exe" zed-dist\ZedG.exe
          Compress-Archive -Path zed-dist\* -DestinationPath "zedg-$env:LANG_LOWER-windows-x86_64-$env:BUILD_VERSION.zip"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: zed-windows
          path: zedg-${{ env.LANG_LOWER }}-windows-x86_64-${{ env.BUILD_VERSION }}.zip

  # ===========================================================================
  # 3b. Windows ARM64 构建
  # ===========================================================================
  build-windows-aarch64:
    needs: [versioning, prepare]
    if: ${{ needs.versioning.outputs.should_release == 'true' }}
    runs-on: windows-11-arm
    env:
      SCCACHE_DIR: C:\cc\sccache
      SCCACHE_IDLE_TIMEOUT: "0"
      BUILD_VERSION: ${{ needs.versioning.outputs.upstream_version }}
      LANG_LOWER: ${{ needs.versioning.outputs.lang_lower }}
    steps:
      - uses: actions/checkout@v4

      - name: 开启 Git Longpaths
        run: git config --system core.longpaths true

      - name: 设置工作目录
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\cc
          New-Item -ItemType Directory -Force -Path C:\cc\sccache
          New-Item -ItemType Directory -Force -Path C:\temp
          echo "CARGO_HOME=C:\cc" >> $env:GITHUB_ENV
          echo "TEMP=C:\temp" >> $env:GITHUB_ENV
          echo "TMP=C:\temp" >> $env:GITHUB_ENV

      - name: 克隆 Zed 源码并检出 Tag
        shell: pwsh
        run: |
          git -c core.autocrlf=false clone ${{ env.ZED_REPO }} C:\z
          Set-Location C:\z
          git checkout $env:BUILD_VERSION
          Write-Host "已切换到版本: $env:BUILD_VERSION"

      - name: 下载本地化补丁
        uses: actions/download-artifact@v4
        with:
          name: l10n-patch

      - name: 应用本地化补丁
        shell: bash
        run: |
          cd /c/z
          git apply "$GITHUB_WORKSPACE/l10n.patch"

      - name: 准备 Rust 环境
        run: |
          rustup update stable
          rustup default stable
          rustup target add aarch64-pc-windows-msvc

      - name: 安装 sccache
        shell: pwsh
        run: |
          $installed = $false

          # 方案1: choco 安装（最多重试 3 次）
          if (Get-Command choco -ErrorAction SilentlyContinue) {
            for ($i = 1; $i -le 3; $i++) {
              Write-Host "Chocolatey 安装 sccache 尝试 $i/3..."
              choco install sccache -y --no-progress 2>&1
              if ($LASTEXITCODE -eq 0 -and (Get-Command sccache -ErrorAction SilentlyContinue)) {
                Write-Host "choco 安装成功"
                $installed = $true
                break
              }
              Write-Host "第 $i 次安装失败 (exit=$LASTEXITCODE)"
              if ($i -lt 3) { Write-Host "等待 30 秒后重试..."; Start-Sleep -Seconds 30 }
            }
          }

          # 方案2: 直接从 GitHub Releases 下载 ARM64 版本
          if (-not $installed) {
            Write-Host "尝试从 GitHub Releases 直接下载 ARM64 版本..."
            try {
              $release = Invoke-RestMethod "https://api.github.com/repos/mozilla/sccache/releases/latest"
              $asset = $release.assets | Where-Object {
                $_.name -match "aarch64-pc-windows-msvc" -and $_.name -match "\.zip$"
              } | Select-Object -First 1
              if ($asset) {
                Write-Host "下载: $($asset.browser_download_url)"
                $zipPath = "C:\temp\sccache.zip"
                $binDir  = "C:\temp\sccache-bin"
                Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath -UseBasicParsing
                Expand-Archive -Path $zipPath -DestinationPath $binDir -Force
                $sccacheExe = Get-ChildItem -Path $binDir -Filter "sccache.exe" -Recurse | Select-Object -First 1
                if ($sccacheExe) {
                  echo "$($sccacheExe.DirectoryName)" >> $env:GITHUB_PATH
                  & "$($sccacheExe.FullName)" --version
                  if ($LASTEXITCODE -eq 0) {
                    Write-Host "GitHub Releases 安装成功"
                    $installed = $true
                  }
                }
              } else {
                Write-Host "未找到 Windows ARM64 资产"
              }
            } catch {
              Write-Host "GitHub Releases 下载失败: $_"
            }
          }

          if ($installed) {
            echo "SCCACHE_AVAILABLE=true" >> $env:GITHUB_ENV
            Write-Host "✓ sccache 可用，将启用编译缓存"
          } else {
            echo "SCCACHE_AVAILABLE=false" >> $env:GITHUB_ENV
            Write-Host "⚠ sccache 所有安装方式均失败，将不使用编译缓存"
          }

      - name: 从 Artifact 恢复 sccache 缓存
        if: env.SCCACHE_AVAILABLE == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          MSYS_NO_PATHCONV: 1
        shell: bash
        run: |
          CACHE_KEY="sccache-windows-aarch64"
          PREV_RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/contents/sccache/${CACHE_KEY}.runid?ref=i18n" \
            --jq '.content' 2>/dev/null | \
            python3 -c "import base64,sys; print(base64.b64decode(sys.stdin.read()).decode().strip())" \
            2>/dev/null || true)
          [ -z "$PREV_RUN_ID" ] && echo "⚠ 无缓存索引，首次构建" && exit 0
          ARTIFACT_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/runs/${PREV_RUN_ID}/artifacts" \
            --jq ".artifacts[] | select(.name == \"${CACHE_KEY}\") | .id" 2>/dev/null || true)
          [ -z "$ARTIFACT_ID" ] && echo "⚠ Artifact 不存在或已过期" && exit 0
          echo "下载缓存 Artifact (ID: $ARTIFACT_ID)..."
          curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o /tmp/sccache-cache.zip
          unzip -p /tmp/sccache-cache.zip "${CACHE_KEY}.tar.gz" | \
            tar -xzf - -C /c/ 2>/dev/null || true
          rm -f /tmp/sccache-cache.zip
          echo "✓ 缓存已恢复（Artifact）"
          echo "PREV_ARTIFACT_ID=${ARTIFACT_ID}" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_HIT=artifact" >> "$GITHUB_ENV"

      - name: 从 Cache 恢复 sccache 缓存（Artifact 失败时回退）
        if: env.SCCACHE_AVAILABLE == 'true' && env.SCCACHE_CACHE_HIT != 'artifact'
        uses: actions/cache/restore@v4
        with:
          path: |
            C:\cc\sccache
            C:\cc\registry
            C:\cc\git
          key: sccache-windows-aarch64
          restore-keys: sccache-win

      - name: 启动 sccache server
        if: env.SCCACHE_AVAILABLE == 'true'
        run: |
          sccache --start-server
          sccache --zero-stats

      - name: 构建 Release (带重试)
        shell: pwsh
        env:
          RELEASE_CHANNEL: stable
        run: |
          if ($env:SCCACHE_AVAILABLE -eq "true") {
            $env:RUSTC_WRAPPER = "sccache"
            Write-Host "已启用 sccache 编译缓存"
          } else {
            $env:RUSTC_WRAPPER = ""
            Write-Host "⚠ sccache 不可用，直接编译（无缓存加速）"
          }

          $monitorJob = Start-Job -ScriptBlock {
              $log = "C:\mem_monitor.csv"
              "timestamp,used_mb,total_mb,swap_used_mb,swap_total_mb" | Out-File $log
              while ($true) {
                  $os = Get-CimInstance Win32_OperatingSystem
                  $totalMB = [math]::Round($os.TotalVisibleMemorySize / 1024)
                  $freeMB  = [math]::Round($os.FreePhysicalMemory / 1024)
                  $usedMB  = $totalMB - $freeMB
                  $swapTotalMB = [math]::Round(($os.SizeStoredInPagingFiles) / 1024)
                  $swapFreeMB  = [math]::Round(($os.FreeSpaceInPagingFiles) / 1024)
                  $swapUsedMB  = $swapTotalMB - $swapFreeMB
                  $ts = Get-Date -Format "HH:mm:ss"
                  "$ts,$usedMB,$totalMB,$swapUsedMB,$swapTotalMB" | Out-File $log -Append
                  Start-Sleep -Seconds 10
              }
          }

          python3 "$env:GITHUB_WORKSPACE\script\ci-build.py" --source-dir C:\z --target aarch64-pc-windows-msvc --jobs 4 --retries 3
          $buildExit = $LASTEXITCODE

          Stop-Job $monitorJob; Remove-Job $monitorJob
          Write-Host "===== 内存监控摘要 ====="
          if (Test-Path "C:\mem_monitor.csv") {
              $csv = Import-Csv "C:\mem_monitor.csv"
              if ($csv.Count -gt 0) {
                  $peakMem  = ($csv | Measure-Object -Property used_mb -Maximum).Maximum
                  $peakSwap = ($csv | Measure-Object -Property swap_used_mb -Maximum).Maximum
                  $totalMem = $csv[0].total_mb
                  Write-Host "物理内存: 峰值 ${peakMem}MB / 总计 ${totalMem}MB"
                  Write-Host "交换内存: 峰值 ${peakSwap}MB"
                  if ([int]$peakSwap -gt 0) { Write-Host "⚠ 编译期间使用了交换内存!" }
                  Write-Host "采样记录数: $($csv.Count)"
              } else {
                  Write-Host "(no samples collected)"
              }
          } else {
              Write-Host "(monitor did not produce data)"
          }

          if ($buildExit -ne 0) { exit $buildExit }

      - name: 停止 sccache
        if: env.SCCACHE_AVAILABLE == 'true'
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "========================================="
          Write-Host "         sccache 编译缓存统计"
          Write-Host "========================================="
          $stats = sccache --show-stats 2>&1
          $stats | Write-Host
          Write-Host "-----------------------------------------"
          $hits   = ($stats | Select-String "Cache hits\s+(\d+)" | ForEach-Object { $_.Matches[0].Groups[1].Value }) -as [int]
          $misses = ($stats | Select-String "Cache misses\s+(\d+)" | ForEach-Object { $_.Matches[0].Groups[1].Value }) -as [int]
          $total  = $hits + $misses
          if ($total -gt 0) {
              $rate = [math]::Round($hits / $total * 100, 1)
              Write-Host ">>> 缓存命中: $hits / $total ($rate%)"
              if ($rate -lt 30) { Write-Host ">>> ⚠ 命中率偏低，首次构建或缓存失效" }
          } else {
              Write-Host ">>> 无编译请求经过 sccache"
          }
          Write-Host "========================================="
          Write-Host ""
          sccache --stop-server || $true

      - name: 打包 sccache 缓存
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        shell: bash
        run: |
          CACHE_KEY="sccache-windows-aarch64"
          tar -czf "${CACHE_KEY}.tar.gz" \
            --ignore-failed-read \
            -C /d \
            c/sccache c/registry c/git 2>/dev/null || true
          echo "缓存归档大小: $(du -sh ${CACHE_KEY}.tar.gz | cut -f1)"

      - name: 上传 sccache 缓存 Artifact
        id: upload_artifact
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sccache-windows-aarch64
          path: sccache-windows-aarch64.tar.gz
          retention-days: 30

      - name: 更新缓存索引
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          MSYS_NO_PATHCONV: 1
        shell: bash
        run: |
          CACHE_KEY="sccache-windows-aarch64"
          if [ -n "${PREV_ARTIFACT_ID:-}" ]; then
            gh api -X DELETE \
              "/repos/${{ github.repository }}/actions/artifacts/${PREV_ARTIFACT_ID}" \
              && echo "✓ 已删除旧 Artifact" || true
          fi
          FILE_PATH="sccache/${CACHE_KEY}.runid"
          CONTENT_B64=$(python3 -c "import base64; print(base64.b64encode('${{ github.run_id }}'.encode()).decode())")
          FILE_SHA=$(gh api \
            "/repos/${{ github.repository }}/contents/${FILE_PATH}?ref=i18n" \
            --jq '.sha' 2>/dev/null || true)
          if [ -n "$FILE_SHA" ]; then
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f sha="$FILE_SHA" -f branch="i18n"
          else
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f branch="i18n"
          fi
          echo "✓ 缓存索引已更新 (Run ID: ${{ github.run_id }})"

      - name: 保存 sccache 缓存（Artifact 失败时回退）
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome != 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            C:\cc\sccache
            C:\cc\registry
            C:\cc\git
          key: sccache-windows-aarch64

      - name: 打包 Windows ARM64
        shell: pwsh
        run: |
          mkdir zed-dist
          Copy-Item "C:\z\target\aarch64-pc-windows-msvc\release\zed.exe" zed-dist\ZedG.exe
          Compress-Archive -Path zed-dist\* -DestinationPath "zedg-$env:LANG_LOWER-windows-aarch64-$env:BUILD_VERSION.zip"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: zed-windows-arm64
          path: zedg-${{ env.LANG_LOWER }}-windows-aarch64-${{ env.BUILD_VERSION }}.zip

  # ===========================================================================
  # 3c. Windows MSI 安装包构建（依赖 x64 和 arm64 产物）
  # ===========================================================================
  build-windows-msi:
    needs: [versioning, build-windows-x86_64, build-windows-aarch64]
    if: ${{ needs.versioning.outputs.should_release == 'true' }}
    runs-on: windows-latest
    env:
      BUILD_VERSION: ${{ needs.versioning.outputs.version }}
      LANG_LOWER: ${{ needs.versioning.outputs.lang_lower }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 下载 Windows x64 产物
        uses: actions/download-artifact@v4
        with:
          name: zed-windows
          path: artifacts/x64

      - name: 下载 Windows ARM64 产物
        uses: actions/download-artifact@v4
        with:
          name: zed-windows-arm64
          path: artifacts/arm64

      - name: 构建 MSI
        continue-on-error: true
        shell: pwsh
        run: |
          $msiVer = ($env:BUILD_VERSION -replace '^v', '') -split '-' | Select-Object -First 1

          $guidX64   = "{6F4A2B8C-1D3E-5F7A-9B0C-2D4E6F8A0B1C}"
          $guidArm64 = "{7E5B3C9D-2E4F-6A8B-0C1D-3E5F7A9B1C2D}"

          function Build-Msi {
            param($Arch, $ZipPath, $ExeSubPath, $UpgradeCode, $OutFile)
            Expand-Archive $ZipPath -DestinationPath "extracted\$Arch" -Force
            $exePath = Resolve-Path "extracted\$Arch\$ExeSubPath"
            candle -arch $Arch `
              "-dAppVersion=$msiVer" `
              "-dSourceExe=$exePath" `
              "-dUpgradeCode=$UpgradeCode" `
              .github\installer\zedg.wxs `
              -o "$Arch.wixobj"
            light "$Arch.wixobj" -o $OutFile
          }

          Build-Msi `
            -Arch x64 `
            -ZipPath "artifacts\x64\zedg-$env:LANG_LOWER-windows-x86_64-$env:BUILD_VERSION.zip" `
            -ExeSubPath ZedG.exe `
            -UpgradeCode $guidX64 `
            -OutFile "zedg-$env:LANG_LOWER-windows-x86_64-$env:BUILD_VERSION.msi"

          Build-Msi `
            -Arch arm64 `
            -ZipPath "artifacts\arm64\zedg-$env:LANG_LOWER-windows-aarch64-$env:BUILD_VERSION.zip" `
            -ExeSubPath ZedG.exe `
            -UpgradeCode $guidArm64 `
            -OutFile "zedg-$env:LANG_LOWER-windows-aarch64-$env:BUILD_VERSION.msi"

      - name: 上传 MSI 产物
        if: hashFiles('*.msi') != ''
        uses: actions/upload-artifact@v4
        with:
          name: zed-windows-msi
          path: "*.msi"

  # ===========================================================================
  # 4. Linux 构建
  # ===========================================================================
  build-linux-x86_64:
    needs: [versioning, prepare]
    if: ${{ needs.versioning.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    env:
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_IDLE_TIMEOUT: "0"
      BUILD_VERSION: ${{ needs.versioning.outputs.upstream_version }}
      LANG_LOWER: ${{ needs.versioning.outputs.lang_lower }}
    steps:
      - uses: actions/checkout@v4

      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: 安装 sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.3

      - name: 检查 sccache 可用性
        run: |
          if command -v sccache &>/dev/null && sccache --version &>/dev/null; then
            echo "SCCACHE_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "✓ sccache 可用，将启用编译缓存"
          else
            echo "SCCACHE_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "⚠ sccache 不可用，将不使用编译缓存"
          fi

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config python3 libasound2-dev \
            libx11-dev libx11-xcb-dev libxkbfile-dev libgtk-3-dev \
            libxcb-xinput-dev libwayland-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-xinerama0-dev \
            libxcb-randr0-dev libxcb-keysyms1-dev libxcb-util-dev \
            libgl1-mesa-dev libegl1-mesa-dev libfreetype6-dev libfontconfig1-dev \
            libssl-dev libudev-dev libclang-dev clang cmake mold
          echo "RUSTFLAGS=-C linker=clang -C link-arg=-fuse-ld=mold" >> $GITHUB_ENV

      - name: 克隆 Zed 源码并检出 Tag
        run: |
          git clone ${{ env.ZED_REPO }} zed
          cd zed
          git checkout $BUILD_VERSION
          echo "Checked out $BUILD_VERSION"

      - name: 下载本地化补丁
        uses: actions/download-artifact@v4
        with:
          name: l10n-patch

      - name: 应用本地化补丁
        run: |
          cd zed
          git apply ../l10n.patch

      - name: 从 Artifact 恢复 sccache 缓存
        if: env.SCCACHE_AVAILABLE == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CACHE_KEY="sccache-linux-x86_64"
          PREV_RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/contents/sccache/${CACHE_KEY}.runid?ref=i18n" \
            --jq '.content' 2>/dev/null | \
            python3 -c "import base64,sys; print(base64.b64decode(sys.stdin.read()).decode().strip())" \
            2>/dev/null || true)
          [ -z "$PREV_RUN_ID" ] && echo "⚠ 无缓存索引，首次构建" && exit 0
          ARTIFACT_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/runs/${PREV_RUN_ID}/artifacts" \
            --jq ".artifacts[] | select(.name == \"${CACHE_KEY}\") | .id" 2>/dev/null || true)
          [ -z "$ARTIFACT_ID" ] && echo "⚠ Artifact 不存在或已过期" && exit 0
          echo "下载缓存 Artifact (ID: $ARTIFACT_ID)..."
          curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o /tmp/sccache-cache.zip
          unzip -p /tmp/sccache-cache.zip "${CACHE_KEY}.tar.gz" | \
            tar -xzf - -C / 2>/dev/null || true
          rm -f /tmp/sccache-cache.zip
          echo "✓ 缓存已恢复（Artifact）"
          echo "PREV_ARTIFACT_ID=${ARTIFACT_ID}" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_HIT=artifact" >> "$GITHUB_ENV"

      - name: 从 Cache 恢复 sccache 缓存（Artifact 失败时回退）
        if: env.SCCACHE_AVAILABLE == 'true' && env.SCCACHE_CACHE_HIT != 'artifact'
        uses: actions/cache/restore@v4
        with:
          path: |
            /home/runner/.cache/sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: sccache-linux-x86_64
          restore-keys: sccache-linux

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启动 sccache
        if: env.SCCACHE_AVAILABLE == 'true'
        run: |
          sccache --stop-server || true
          sccache --start-server
          sccache --zero-stats
          sccache -s

      - name: 构建 Release
        env:
          RELEASE_CHANNEL: stable
        run: |
          # 根据 sccache 可用性决定是否启用缓存
          if [ "$SCCACHE_AVAILABLE" = "true" ]; then
            export RUSTC_WRAPPER=sccache
            echo "已启用 sccache 编译缓存"
          else
            export RUSTC_WRAPPER=""
            echo "⚠ sccache 不可用，直接编译（无缓存加速）"
          fi

          # 启动内存监控后台进程
          MEM_LOG="/tmp/mem_monitor.csv"
          echo "timestamp,used_mb,total_mb,swap_used_mb,swap_total_mb" > "$MEM_LOG"
          (
            while true; do
              read _ TOTAL _ FREE _ <<< $(grep -E '^MemTotal:|^MemAvailable:' /proc/meminfo | awk '{print $2}')
              TOTAL_MB=$(($(awk '/^MemTotal:/{print $2}' /proc/meminfo) / 1024))
              AVAIL_MB=$(($(awk '/^MemAvailable:/{print $2}' /proc/meminfo) / 1024))
              USED_MB=$((TOTAL_MB - AVAIL_MB))
              SWAP_TOTAL_MB=$(($(awk '/^SwapTotal:/{print $2}' /proc/meminfo) / 1024))
              SWAP_FREE_MB=$(($(awk '/^SwapFree:/{print $2}' /proc/meminfo) / 1024))
              SWAP_USED_MB=$((SWAP_TOTAL_MB - SWAP_FREE_MB))
              echo "$(date +%H:%M:%S),$USED_MB,$TOTAL_MB,$SWAP_USED_MB,$SWAP_TOTAL_MB" >> "$MEM_LOG"
              sleep 10
            done
          ) &
          MONITOR_PID=$!

          set +e
          python3 "$GITHUB_WORKSPACE/script/ci-build.py" --source-dir "$GITHUB_WORKSPACE/zed" --jobs 4
          BUILD_EXIT=$?
          set -e

          # 停止监控并输出摘要
          kill $MONITOR_PID 2>/dev/null || true
          echo "===== 内存监控摘要 ====="
          PEAK_MEM=$(tail -n +2 "$MEM_LOG" | cut -d, -f2 | sort -n | tail -1)
          PEAK_SWAP=$(tail -n +2 "$MEM_LOG" | cut -d, -f4 | sort -n | tail -1)
          TOTAL_MEM=$(tail -n +2 "$MEM_LOG" | head -1 | cut -d, -f3)
          TOTAL_SWAP=$(tail -n +2 "$MEM_LOG" | head -1 | cut -d, -f5)
          SAMPLES=$(tail -n +2 "$MEM_LOG" | wc -l)
          echo "物理内存: 峰值 ${PEAK_MEM}MB / 总计 ${TOTAL_MEM}MB"
          echo "交换内存: 峰值 ${PEAK_SWAP}MB / 总计 ${TOTAL_SWAP}MB"
          if [ "$PEAK_SWAP" -gt 0 ] 2>/dev/null; then echo "⚠ 编译期间使用了交换内存!"; fi
          echo "采样记录数: $SAMPLES"

          exit $BUILD_EXIT

      - name: 停止 sccache
        if: env.SCCACHE_AVAILABLE == 'true'
        run: |
          echo ""
          echo "========================================="
          echo "         sccache 编译缓存统计"
          echo "========================================="
          sccache --show-stats
          echo "-----------------------------------------"
          HITS=$(sccache --show-stats 2>&1 | awk '/^Cache hits /{print $NF}' | head -1)
          MISSES=$(sccache --show-stats 2>&1 | awk '/^Cache misses /{print $NF}' | head -1)
          HITS=${HITS:-0}; MISSES=${MISSES:-0}
          TOTAL=$((HITS + MISSES))
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(awk "BEGIN {printf \"%.1f\", $HITS/$TOTAL*100}")
            echo ">>> 缓存命中: $HITS / $TOTAL ($RATE%)"
            if [ "$(echo "$RATE < 30" | bc)" -eq 1 ]; then echo ">>> ⚠ 命中率偏低，首次构建或缓存失效"; fi
          else
            echo ">>> 无编译请求经过 sccache"
          fi
          echo "========================================="
          echo ""
          sccache --stop-server || true

      - name: 打包 sccache 缓存
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        run: |
          CACHE_KEY="sccache-linux-x86_64"
          tar -czf "${CACHE_KEY}.tar.gz" \
            --ignore-failed-read \
            -C / \
            home/runner/.cache/sccache \
            home/runner/.cargo/registry \
            home/runner/.cargo/git 2>/dev/null || true
          echo "缓存归档大小: $(du -sh ${CACHE_KEY}.tar.gz | cut -f1)"

      - name: 上传 sccache 缓存 Artifact
        id: upload_artifact
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sccache-linux-x86_64
          path: sccache-linux-x86_64.tar.gz
          retention-days: 30

      - name: 更新缓存索引
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CACHE_KEY="sccache-linux-x86_64"
          if [ -n "${PREV_ARTIFACT_ID:-}" ]; then
            gh api -X DELETE \
              "/repos/${{ github.repository }}/actions/artifacts/${PREV_ARTIFACT_ID}" \
              && echo "✓ 已删除旧 Artifact" || true
          fi
          FILE_PATH="sccache/${CACHE_KEY}.runid"
          CONTENT_B64=$(python3 -c "import base64; print(base64.b64encode('${{ github.run_id }}'.encode()).decode())")
          FILE_SHA=$(gh api \
            "/repos/${{ github.repository }}/contents/${FILE_PATH}?ref=i18n" \
            --jq '.sha' 2>/dev/null || true)
          if [ -n "$FILE_SHA" ]; then
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f sha="$FILE_SHA" -f branch="i18n"
          else
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f branch="i18n"
          fi
          echo "✓ 缓存索引已更新 (Run ID: ${{ github.run_id }})"

      - name: 保存 sccache 缓存（Artifact 失败时回退）
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome != 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            /home/runner/.cache/sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: sccache-linux-x86_64

      - name: 打包 Linux
        run: |
          objcopy --strip-debug zed/target/release/zed

          # === tar.gz 包 ===
          mkdir -p dist/usr/bin
          mkdir -p dist/usr/share/applications
          mkdir -p dist/usr/share/icons/hicolor/512x512/apps
          mkdir -p dist/usr/share/icons/hicolor/1024x1024/apps
          cp "zed/target/release/zed" dist/usr/bin/zedg

          cp zed/crates/zed/resources/app-icon.png \
             dist/usr/share/icons/hicolor/512x512/apps/zedg.png
          cp zed/crates/zed/resources/app-icon@2x.png \
             dist/usr/share/icons/hicolor/1024x1024/apps/zedg.png

          cat > dist/usr/share/applications/zedg.desktop <<DESKTOP
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=ZedG
          GenericName=Text Editor
          Comment=A high-performance, multiplayer code editor with globalization support.
          TryExec=zedg
          StartupNotify=true
          Exec=zedg %F
          Icon=zedg
          Categories=Utility;TextEditor;Development;IDE;
          Keywords=zed;
          MimeType=text/plain;
          DESKTOP

          tar -czvf "zedg-${LANG_LOWER}-linux-x86_64-${BUILD_VERSION}.tar.gz" -C dist .

          # === deb 包 ===
          mkdir -p deb-pkg/DEBIAN deb-pkg/usr/bin
          mkdir -p deb-pkg/usr/share/applications
          mkdir -p deb-pkg/usr/share/icons/hicolor/512x512/apps
          mkdir -p deb-pkg/usr/share/icons/hicolor/1024x1024/apps
          cp "zed/target/release/zed" deb-pkg/usr/bin/zedg
          cp dist/usr/share/applications/zedg.desktop deb-pkg/usr/share/applications/
          cp dist/usr/share/icons/hicolor/512x512/apps/zedg.png \
             deb-pkg/usr/share/icons/hicolor/512x512/apps/
          cp dist/usr/share/icons/hicolor/1024x1024/apps/zedg.png \
             deb-pkg/usr/share/icons/hicolor/1024x1024/apps/

          RAW_VERSION="${{ needs.versioning.outputs.upstream_version }}"
          CLEAN_VERSION="${RAW_VERSION#v}"
          cat > deb-pkg/DEBIAN/control <<CTRL
          Package: zedg
          Version: $CLEAN_VERSION
          Architecture: amd64
          Maintainer: zed-globalization
          Description: Zed editor with globalization support.
          CTRL
          dpkg-deb --build deb-pkg "zedg-${LANG_LOWER}-linux-x86_64-${BUILD_VERSION}.deb"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux
          path: |
            zedg-${{ env.LANG_LOWER }}-linux-x86_64-${{ env.BUILD_VERSION }}.tar.gz
            zedg-${{ env.LANG_LOWER }}-linux-x86_64-${{ env.BUILD_VERSION }}.deb

  # ===========================================================================
  # 5a. macOS aarch64 编译（Apple Silicon）
  # ===========================================================================
  build-macos-aarch64:
    needs: [versioning, prepare]
    if: ${{ needs.versioning.outputs.should_release == 'true' }}
    runs-on: macos-latest
    env:
      SCCACHE_DIR: /Users/runner/Library/Caches/Mozilla.sccache
      SCCACHE_IDLE_TIMEOUT: "0"
      BUILD_VERSION: ${{ needs.versioning.outputs.upstream_version }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.3

      - name: 检查 sccache 可用性
        run: |
          if command -v sccache &>/dev/null && sccache --version &>/dev/null; then
            echo "SCCACHE_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "⚠ sccache 不可用，将不使用编译缓存"
          fi

      - name: 克隆 Zed 源码并检出 Tag
        run: |
          git clone ${{ env.ZED_REPO }} zed
          cd zed && git checkout $BUILD_VERSION

      - name: 下载本地化补丁
        uses: actions/download-artifact@v4
        with:
          name: l10n-patch

      - name: 应用本地化补丁
        run: cd zed && git apply ../l10n.patch

      - name: 从 Artifact 恢复 sccache 缓存
        if: env.SCCACHE_AVAILABLE == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CACHE_KEY="sccache-macos-aarch64"
          PREV_RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/contents/sccache/${CACHE_KEY}.runid?ref=i18n" \
            --jq '.content' 2>/dev/null | \
            python3 -c "import base64,sys; print(base64.b64decode(sys.stdin.read()).decode().strip())" \
            2>/dev/null || true)
          [ -z "$PREV_RUN_ID" ] && echo "⚠ 无缓存索引，首次构建" && exit 0
          ARTIFACT_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/runs/${PREV_RUN_ID}/artifacts" \
            --jq ".artifacts[] | select(.name == \"${CACHE_KEY}\") | .id" 2>/dev/null || true)
          [ -z "$ARTIFACT_ID" ] && echo "⚠ Artifact 不存在或已过期" && exit 0
          echo "下载缓存 Artifact (ID: $ARTIFACT_ID)..."
          curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o /tmp/sccache-cache.zip
          unzip -p /tmp/sccache-cache.zip "${CACHE_KEY}.tar.gz" | \
            tar -xzf - -C / 2>/dev/null || true
          rm -f /tmp/sccache-cache.zip
          echo "✓ 缓存已恢复（Artifact）"
          echo "PREV_ARTIFACT_ID=${ARTIFACT_ID}" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_HIT=artifact" >> "$GITHUB_ENV"

      - name: 从 Cache 恢复 sccache 缓存（Artifact 失败时回退）
        if: env.SCCACHE_AVAILABLE == 'true' && env.SCCACHE_CACHE_HIT != 'artifact'
        uses: actions/cache/restore@v4
        with:
          path: |
            /Users/runner/Library/Caches/Mozilla.sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: sccache-macos-aarch64
          restore-keys: sccache-macos

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: 启动 sccache
        if: env.SCCACHE_AVAILABLE == 'true'
        run: sccache --start-server && sccache --zero-stats

      - name: 构建 aarch64
        env:
          RELEASE_CHANNEL: stable
        run: |
          if [ "$SCCACHE_AVAILABLE" = "true" ]; then
            export RUSTC_WRAPPER=sccache
          else
            export RUSTC_WRAPPER=""
          fi

          MEM_LOG="/tmp/mem_monitor.csv"
          echo "timestamp,used_mb,total_mb,swap_used_mb,swap_total_mb" > "$MEM_LOG"
          (
            TOTAL_MB=$(( $(sysctl -n hw.memsize) / 1024 / 1024 ))
            PAGE_SIZE=$(vm_stat | head -1 | grep -oE '[0-9]+')
            while true; do
              FREE_PAGES=$(vm_stat | awk '/Pages free/ {print $NF}' | tr -d '.')
              INACTIVE_PAGES=$(vm_stat | awk '/Pages inactive/ {print $NF}' | tr -d '.')
              SPECULATIVE_PAGES=$(vm_stat | awk '/Pages speculative/ {print $NF}' | tr -d '.')
              AVAIL_MB=$(( (${FREE_PAGES:-0} + ${INACTIVE_PAGES:-0} + ${SPECULATIVE_PAGES:-0}) * PAGE_SIZE / 1024 / 1024 ))
              USED_MB=$(( TOTAL_MB - AVAIL_MB ))
              SWAP_USED_MB=$(sysctl -n vm.swapusage | awk -F'[= ]+' '{for(i=1;i<=NF;i++) if($i=="used") printf "%d", $(i+1)}')
              SWAP_TOTAL_MB=$(sysctl -n vm.swapusage | awk -F'[= ]+' '{for(i=1;i<=NF;i++) if($i=="total") printf "%d", $(i+1)}')
              echo "$(date +%H:%M:%S),$USED_MB,$TOTAL_MB,${SWAP_USED_MB:-0},${SWAP_TOTAL_MB:-0}" >> "$MEM_LOG"
              sleep 10
            done
          ) &
          MONITOR_PID=$!

          set +e
          python3 "$GITHUB_WORKSPACE/script/ci-build.py" --source-dir "$GITHUB_WORKSPACE/zed" --target aarch64-apple-darwin --jobs 4
          BUILD_EXIT=$?
          set -e

          kill $MONITOR_PID 2>/dev/null || true
          PEAK_MEM=$(tail -n +2 "$MEM_LOG" | cut -d, -f2 | sort -n | tail -1)
          PEAK_SWAP=$(tail -n +2 "$MEM_LOG" | cut -d, -f4 | sort -n | tail -1)
          TOTAL_MEM=$(tail -n +2 "$MEM_LOG" | head -1 | cut -d, -f3)
          SAMPLES=$(tail -n +2 "$MEM_LOG" | wc -l)
          echo "===== 内存监控摘要 ====="
          echo "物理内存: 峰值 ${PEAK_MEM}MB / 总计 ${TOTAL_MEM}MB"
          echo "交换内存: 峰值 ${PEAK_SWAP}MB"
          echo "采样记录数: $SAMPLES"
          [ $BUILD_EXIT -ne 0 ] && exit $BUILD_EXIT

          echo "=== 编译 CLI 辅助二进制 ==="
          cargo build --release --package cli --target aarch64-apple-darwin --manifest-path "$GITHUB_WORKSPACE/zed/Cargo.toml"

      - name: 停止 sccache
        if: env.SCCACHE_AVAILABLE == 'true'
        run: |
          echo "========================================="
          echo "         sccache 编译缓存统计 (aarch64)"
          echo "========================================="
          sccache --show-stats
          HITS=$(sccache --show-stats 2>&1 | awk '/^Cache hits /{print $NF}' | head -1)
          MISSES=$(sccache --show-stats 2>&1 | awk '/^Cache misses /{print $NF}' | head -1)
          HITS=${HITS:-0}; MISSES=${MISSES:-0}; TOTAL=$((HITS + MISSES))
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(awk "BEGIN {printf \"%.1f\", $HITS/$TOTAL*100}")
            echo ">>> 缓存命中: $HITS / $TOTAL ($RATE%)"
          fi
          echo "========================================="
          sccache --stop-server || true

      - name: 打包 sccache 缓存
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        run: |
          CACHE_KEY="sccache-macos-aarch64"
          DIRS=()
          [ -d "$HOME/Library/Caches/Mozilla.sccache" ] && DIRS+=("Users/runner/Library/Caches/Mozilla.sccache")
          [ -d "$HOME/.cargo/registry" ] && DIRS+=("Users/runner/.cargo/registry")
          [ -d "$HOME/.cargo/git" ]      && DIRS+=("Users/runner/.cargo/git")
          if [ ${#DIRS[@]} -gt 0 ]; then
            tar -czf "${CACHE_KEY}.tar.gz" -C / "${DIRS[@]}" 2>/dev/null || true
          fi
          echo "缓存归档大小: $(du -sh ${CACHE_KEY}.tar.gz 2>/dev/null | cut -f1 || echo '(未生成)')"

      - name: 上传 sccache 缓存 Artifact
        id: upload_artifact
        if: always() && env.SCCACHE_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sccache-macos-aarch64
          path: sccache-macos-aarch64.tar.gz
          retention-days: 30

      - name: 更新缓存索引
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CACHE_KEY="sccache-macos-aarch64"
          if [ -n "${PREV_ARTIFACT_ID:-}" ]; then
            gh api -X DELETE \
              "/repos/${{ github.repository }}/actions/artifacts/${PREV_ARTIFACT_ID}" \
              && echo "✓ 已删除旧 Artifact" || true
          fi
          FILE_PATH="sccache/${CACHE_KEY}.runid"
          CONTENT_B64=$(python3 -c "import base64; print(base64.b64encode('${{ github.run_id }}'.encode()).decode())")
          FILE_SHA=$(gh api \
            "/repos/${{ github.repository }}/contents/${FILE_PATH}?ref=i18n" \
            --jq '.sha' 2>/dev/null || true)
          if [ -n "$FILE_SHA" ]; then
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f sha="$FILE_SHA" -f branch="i18n"
          else
            gh api -X PUT "/repos/${{ github.repository }}/contents/${FILE_PATH}" \
              -f message="chore: 更新 sccache 缓存索引 (${CACHE_KEY})" \
              -f content="$CONTENT_B64" -f branch="i18n"
          fi
          echo "✓ 缓存索引已更新 (Run ID: ${{ github.run_id }})"

      - name: 保存 sccache 缓存（Artifact 失败时回退）
        if: always() && env.SCCACHE_AVAILABLE == 'true' && steps.upload_artifact.outcome != 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            /Users/runner/Library/Caches/Mozilla.sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: sccache-macos-aarch64

      - name: 暂存图标资源
        run: |
          mkdir -p macos-resources
          cp zed/crates/zed/resources/app-icon.png macos-resources/
          cp zed/crates/zed/resources/app-icon@2x.png macos-resources/
          cp zed/crates/zed/resources/Document.icns macos-resources/ 2>/dev/null || true

      - name: 上传 aarch64 二进制
        uses: actions/upload-artifact@v4
        with:
          name: zed-macos-aarch64-bin
          path: |
            zed/target/aarch64-apple-darwin/release/zed
            zed/target/aarch64-apple-darwin/release/cli

      - name: 上传图标资源
        uses: actions/upload-artifact@v4
        with:
          name: zed-macos-resources
          path: macos-resources/

